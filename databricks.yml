bundle:
  name: supervisor_example_obo

# Workspace-specific values come from DAB variables so a fresh clone doesn't
# silently target someone else's workspace. Fill them via either:
#   • `uv run setup-demo --profile <p>` (creates the Genie spaces + MLflow
#     experiment and writes BUNDLE_VAR_* lines into .env), then
#     `uv run deploy --profile <p>` which loads .env and `bundle deploy`s.
#   • or manually: `databricks bundle deploy --var "key=value" ...`.
variables:
  genie_finance_space_id:
    description: "UUID of the finance Genie space (samples.tpch.* in the demo)."
  genie_sales_space_id:
    description: "UUID of the sales Genie space (samples.bakehouse.* in the demo)."
  mlflow_experiment_id:
    description: "MLflow experiment ID for agent traces."
  llm_endpoint_name:
    description: "Chat model serving endpoint used by all supervisors."
    default: "databricks-gpt-5-2"

resources:
  apps:
    supervisor_example_obo:
      name: "supervisor-example-obo"
      description: "Hierarchical LangGraph supervisor agent (L1 -> L2 -> Genie) with end-user OBO."
      source_code_path: ./

      # OAuth scopes requested for the user token forwarded to the app as
      # `x-forwarded-access-token`. The agent calls the direct Genie REST API
      # (w.genie.start_conversation_and_wait), which works with
      # `dashboards.genie` plus the `sql` scope Genie uses to drive the SQL
      # warehouse. The MCP Genie route (/api/2.0/mcp/genie/...) was tried
      # first and 403'd: it requires a scope outside the documented
      # user_api_scopes allowlist (sql / dashboards.genie / files.files).
      user_api_scopes:
        - dashboards.genie
        - sql
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: GENIE_FINANCE_SPACE_ID
            value_from: "genie_finance"
          - name: GENIE_SALES_SPACE_ID
            value_from: "genie_sales"
          - name: LLM_ENDPOINT
            value_from: "llm_endpoint"

      # Resources which this app has access to.
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: ${var.mlflow_experiment_id}
            permission: 'CAN_MANAGE'

        - name: 'genie_finance'
          genie_space:
            name: 'Supervisor OBO - Finance'
            space_id: ${var.genie_finance_space_id}
            permission: 'CAN_RUN'

        - name: 'genie_sales'
          genie_space:
            name: 'Supervisor OBO - Sales'
            space_id: ${var.genie_sales_space_id}
            permission: 'CAN_RUN'

        - name: 'llm_endpoint'
          serving_endpoint:
            name: ${var.llm_endpoint_name}
            permission: 'CAN_QUERY'

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        supervisor_example_obo:
          name: supervisor-example-obo
