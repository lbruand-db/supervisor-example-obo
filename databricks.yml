bundle:
  name: supervisor_example_obo

resources:
  apps:
    supervisor_example_obo:
      name: "supervisor-example-obo"
      description: "Hierarchical LangGraph supervisor agent (L1 -> L2 -> Genie) with end-user OBO."
      source_code_path: ./

      # OAuth scopes requested for the user token forwarded to the app as
      # `x-forwarded-access-token`. Genie + the SQL warehouse it drives both
      # need these — without them, Genie calls 403 under end-user identity.
      user_api_scopes:
        - dashboards.genie
        - sql
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: GENIE_FINANCE_SPACE_ID
            value_from: "genie_finance"
          - name: GENIE_SALES_SPACE_ID
            value_from: "genie_sales"
          - name: LLM_ENDPOINT
            value_from: "llm_endpoint"

      # Resources which this app has access to.
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: '1456842180535736'
            permission: 'CAN_MANAGE'

        - name: 'genie_finance'
          genie_space:
            name: 'Supervisor OBO - Finance'
            space_id: '01f15474886a16d5aa027e0791fa855a'
            permission: 'CAN_RUN'

        - name: 'genie_sales'
          genie_space:
            name: 'Supervisor OBO - Sales'
            space_id: '01f15474da541750b15a234e1fcc4145'
            permission: 'CAN_RUN'

        # TODO: change to whichever chat model serving endpoint you want to use.
        - name: 'llm_endpoint'
          serving_endpoint:
            name: 'databricks-gpt-5-2'
            permission: 'CAN_QUERY'

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        supervisor_example_obo:
          name: supervisor-example-obo
